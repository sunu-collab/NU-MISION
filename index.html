<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>NU Mission 2026 - Premium Scoring System</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a237e;
            --accent-color: #ffc107;
            --bg-color: #f8fafc;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        
        /* Logo & Header */
        .header { text-align: center; margin-bottom: 35px; border-bottom: 4px solid var(--primary-color); padding-bottom: 25px; }
        .logo-container { margin-bottom: 20px; }
        /* ดึงรูปจาก Google Drive โดยใช้รหัสไฟล์ของคุณ */
        .logo-container img { height: 150px; width: auto; object-fit: contain; } 
        .header h1 { margin: 10px 0; color: var(--primary-color); font-weight: 800; font-size: 34px; letter-spacing: 1px; }

        /* Admin Control */
        .admin-panel { background: #edf2f7; padding: 25px; border-radius: 15px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; justify-content: center; border: 1px solid #e2e8f0; }
        .admin-panel input { width: 400px; padding: 12px 20px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 16px; }
        
        /* Table Style */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        th { background: var(--primary-color); color: white; padding: 15px; font-size: 14px; text-transform: uppercase; border: none; }
        th:first-child { border-radius: 10px 0 0 10px; }
        th:last-child { border-radius: 0 10px 10px 0; }
        
        td { background: white; padding: 15px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; transition: 0.3s; }
        td:first-child { border-left: 1px solid #eee; border-radius: 10px 0 0 10px; }
        td:last-child { border-right: 1px solid #eee; border-radius: 0 10px 10px 0; }

        .input-score { width: 85px; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; text-align: center; font-size: 16px; font-weight: bold; }
        .input-name-locked { width: 95%; padding: 10px; border: none; background: transparent; text-align: left; font-size: 17px; color: #2d3748; font-weight: 700; pointer-events: none; }
        .input-name-locked.editable { border-bottom: 2px solid #3182ce; background: #fff; pointer-events: auto; }

        .btn { padding: 12px 30px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-add { background: var(--primary-color); color: white; }
        .btn-main { background: var(--accent-color); color: #fff; width: 100%; margin-top: 30px; font-size: 22px; box-shadow: 0 8px 0 #cc9a06; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 4px 0 #cc9a06; }
        .btn-edit { background: #a0aec0; color: white; font-size: 12px; padding: 6px 12px; }

        /* Rankings 1-4 */
        .rank-item { font-weight: 800; font-size: 20px; }
        
        /* อันดับ 1 ทอง */
        .rank-row-1 td { background-color: #fff9c4 !important; border-color: #fbc02d; color: #856404; }
        .rank-row-1 .display-rank::before { content: '👑 '; }
        .rank-row-1 .final-val { font-size: 28px; color: #d4af37; text-shadow: 1px 1px 0px #fff; }

        /* อันดับ 2 เงิน */
        .rank-row-2 td { background-color: #f1f3f5 !important; border-color: #adb5bd; }
        .rank-row-2 .display-rank { color: #495057; }

        /* อันดับ 3 ทองแดง */
        .rank-row-3 td { background-color: #fff3e0 !important; border-color: #fb8c00; }
        .rank-row-3 .display-rank { color: #e65100; }

        /* อันดับ 4 ฟ้าพิเศษ */
        .rank-row-4 td { background-color: #e3f2fd !important; border-color: #2196f3; }
        .rank-row-4 .display-rank { color: #0d47a1; }

        .final-val { font-weight: 800; font-size: 20px; color: var(--primary-color); }
        .total-info { text-align: right; font-weight: 800; color: #e53e3e; margin-bottom: 10px; font-size: 22px; }
        .btn-clear { background: none; color: #ccc; border: none; margin-top: 50px; cursor: pointer; font-size: 12px; }
        .btn-clear:hover { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <img src="https://lh3.googleusercontent.com/d/19WyvCU-uSsCgwBCLJEeqntLU-hqZkfdR" alt="NU Mission Logo">
        </div>
        <h1>NU Mission 2026: Final Stage</h1>
        <p>Mission 3 Melody : Symphony of the Heartbeat</p>
    </div>

    <div class="admin-panel">
        <strong>เพิ่มทีมใหม่:</strong>
        <input type="text" id="newTeamName" placeholder="ระบุชื่อทีมหรือธีมการแสดง...">
        <button class="btn btn-add" onclick="addNewTeamFromPanel()">+ เพิ่มเข้าสู่ระบบ</button>
    </div>

    <div class="total-info" id="totalVotesText">คะแนนโหวตรวม: 0</div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th width="100">อันดับ</th>
                <th>ชื่อทีม / ธีมการแสดง</th>
                <th width="150">กรรมการ (100)</th>
                <th width="150">โหวตดิบ (คน)</th>
                <th width="120">กรรมการ 50%</th>
                <th width="120">โหวต 50%</th>
                <th width="150">คะแนนสุทธิ</th>
                <th width="100">จัดการ</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="btn btn-main" onclick="runProcess()">📊 คำนวณผล & บันทึกขึ้น CLOUD</button>

    <center><button class="btn btn-clear" onclick="clearData()">ล้างข้อมูลทั้งหมด</button></center>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDCZB-UH_dGvLse9CnMmTurmVpDHTvW6RM",
        authDomain: "nu-mission-2025.firebaseapp.com",
        projectId: "nu-mission-2025",
        storageBucket: "nu-mission-2025.firebasestorage.app",
        messagingSenderId: "55452072551",
        appId: "1:55452072551:web:b6a67a07e9e70d73ee72c2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = () => {
        const savedData = JSON.parse(localStorage.getItem('nu_mission_2026_final')) || [];
        renderTable(savedData);
    };

    function addNewTeamFromPanel() {
        const nameInput = document.getElementById('newTeamName');
        const name = nameInput.value.trim();
        if (!name) return alert("กรุณาใส่ชื่อทีม");
        const savedData = JSON.parse(localStorage.getItem('nu_mission_2026_final')) || [];
        savedData.push({ name: name, jRaw: '', vRaw: '', j50: 0, v50: 0, total: 0 });
        localStorage.setItem('nu_mission_2026_final', JSON.stringify(savedData));
        nameInput.value = '';
        renderTable(savedData);
    }

    function autoSave() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        const data = rows.map(r => ({
            name: r.querySelector('.i-name').value,
            jRaw: r.querySelector('.i-j').value,
            vRaw: r.querySelector('.i-v').value,
            j50: parseFloat(r.querySelector('.r-j').innerText) || 0,
            v50: parseFloat(r.querySelector('.r-v').innerText) || 0,
            total: parseFloat(r.querySelector('.r-t').innerText) || 0
        }));
        localStorage.setItem('nu_mission_2026_final', JSON.stringify(data));
    }

    async function runProcess() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        let totalVotes = 0;
        rows.forEach(r => totalVotes += parseFloat(r.querySelector('.i-v').value) || 0);
        document.getElementById('totalVotesText').innerText = `คะแนนโหวตรวม: ${totalVotes.toLocaleString()}`;

        let dataset = rows.map(r => {
            const name = r.querySelector('.i-name').value;
            const jRaw = parseFloat(r.querySelector('.i-j').value) || 0;
            const vRaw = parseFloat(r.querySelector('.i-v').value) || 0;
            const j50 = jRaw / 2;
            const v50 = totalVotes > 0 ? (vRaw / totalVotes) * 50 : 0;
            return { name, jRaw, vRaw, j50, v50, total: j50 + v50 };
        });

        dataset.sort((a, b) => b.total - a.total);
        renderTable(dataset);
        autoSave();

        const batch = db.batch();
        dataset.forEach((d, i) => {
            const docRef = db.collection("FinalResults2026").doc(`rank_${i + 1}`);
            batch.set(docRef, { ...d, rank: i + 1, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        });
        await batch.commit();
        alert("คำนวณและบันทึกข้อมูลเรียบร้อย!");
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach((d, i) => {
            const row = document.createElement('tr');
            if (d.total > 0) {
                if (i === 0) row.className = 'rank-row-1';
                else if (i === 1) row.className = 'rank-row-2';
                else if (i === 2) row.className = 'rank-row-3';
                else if (i === 3) row.className = 'rank-row-4';
            }
            row.innerHTML = `
                <td class="display-rank rank-item">${d.total > 0 ? (i + 1) : '-'}</td>
                <td><input type="text" class="i-name input-name-locked" value="${d.name}" oninput="autoSave()" readonly></td>
                <td><input type="number" class="i-j input-score" value="${d.jRaw}" oninput="autoSave()"></td>
                <td><input type="number" class="i-v input-score" value="${d.vRaw}" oninput="autoSave()"></td>
                <td class="r-j">${d.j50 ? d.j50.toFixed(2) : '0.00'}</td>
                <td class="r-v">${d.v50 ? d.v50.toFixed(2) : '0.00'}</td>
                <td class="r-t final-val">${d.total ? d.total.toFixed(2) : '0.00'}</td>
                <td><button class="btn btn-edit" onclick="toggleEdit(this)">แก้ไขชื่อ</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function toggleEdit(btn) {
        const row = btn.closest('tr');
        const nameInput = row.querySelector('.i-name');
        if (nameInput.readOnly) {
            nameInput.readOnly = false;
            nameInput.classList.add('editable');
            btn.innerText = "ตกลง";
            btn.style.background = "#27ae60";
        } else {
            nameInput.readOnly = true;
            nameInput.classList.remove('editable');
            btn.innerText = "แก้ไขชื่อ";
            btn.style.background = "#a0aec0";
            autoSave();
        }
    }

    function clearData() {
        if (confirm("ล้างข้อมูลทั้งหมด?")) {
            localStorage.removeItem('nu_mission_2026_final');
            location.reload();
        }
    }
</script>
</body>
</html>
