<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>NU Mission 2026 - Master Scoring System</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a237e; --accent-color: #ffc107; --bg-color: #f4f7f9; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); padding: 20px; }
        
        /* แก้ปัญหา iPad: ให้ตารางเลื่อนซ้ายขวาได้เมื่อหน้าจอแคบ */
        .container { max-width: 1400px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); overflow-x: auto; }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 4px solid var(--primary-color); padding-bottom: 20px; }
        
        /* ปรับปรุงกล่องโลโก้ให้รองรับรูปแนวยาว 3 ตราสัญลักษณ์ */
        .logo-container { 
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        .logo-container img {
            max-width: 100%;
            height: 110px; /* ปรับความสูงของโลโก้ได้ที่นี่ */
            object-fit: contain;
        }
        
        .header h1 { margin: 10px 0; color: var(--primary-color); font-weight: 800; font-size: 30px; }

        .admin-panel { background: #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 10px; align-items: center; justify-content: center; min-width: 600px; }
        .admin-panel input { width: 450px; padding: 12px; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 16px; }
        
        /* แก้ปัญหา iPad: ล็อกความกว้างตารางไม่ให้ตัวอักษรตกบรรทัด */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; min-width: 1100px; }
        th { background: var(--primary-color); color: white; padding: 15px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        td { border: 1px solid #eee; padding: 12px; text-align: center; word-wrap: break-word; }

        .team-name-cell { text-align: left !important; width: 30%; }
        .input-name-display { font-size: 17px; font-weight: bold; color: #1a237e; white-space: normal; }
        .editable-name { width: 90%; padding: 5px; font-family: 'Sarabun'; font-weight: bold; }

        .input-score { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; text-align: center; font-size: 16px; font-weight: bold; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-add { background: var(--primary-color); color: white; }
        .btn-main { background: var(--accent-color); color: white; width: 100%; margin-top: 25px; font-size: 22px; box-shadow: 0 5px 0 #cc9a06; font-weight: 800; min-width: 600px; }
        
        .btn-edit { background: #4a5568; color: white; margin-right: 5px; }
        .btn-delete { background: #e53e3e; color: white; }
        .btn-save-row { background: #2f855a; color: white; margin-right: 5px; }

        .rank-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: 800; min-width: 45px; border: 1px solid #ddd; }
        .r1 { background: #fef3c7; color: #92400e; border-color: #f59e0b; font-size: 18px; }
        .r2 { background: #f1f5f9; color: #475569; }
        .r3 { background: #fff7ed; color: #9a3412; }
        .r4 { background: #eff6ff; color: #1e40af; }

        .total-votes-display { text-align: right; color: #e53e3e; font-weight: 800; font-size: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <img src="Logo.png" alt="NU Mission Logos">
        </div>
        <h1>NU Mission 2026 Scoring</h1>
        <p>ระบบตัดสินรอบชิงชนะเลิศ (Final Round)</p>
    </div>

    <div class="admin-panel">
        <strong>เพิ่มทีมตามลำดับแสดง:</strong>
        <input type="text" id="newTeamName" placeholder="ระบุชื่อทีมหรือธีมการแสดง...">
        <button class="btn btn-add" onclick="addNewTeam()">+ เพิ่มเข้าตาราง</button>
    </div>

    <div class="total-votes-display" id="totalVotesText">ยอดโหวตรวม: 0</div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th width="70">ลำดับ</th>
                <th class="team-name-cell">ชื่อทีม / ธีมการแสดง</th>
                <th width="110">กรรมการ (100)</th>
                <th width="110">โหวต (คน)</th>
                <th width="90">กก. 50%</th>
                <th width="90">โหวต 50%</th>
                <th width="110">คะแนนรวม</th>
                <th width="80">อันดับ</th>
                <th width="180">จัดการ</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="btn btn-main" onclick="runProcess()">📊 ประมวลผลและตัดสินลำดับ (Ranking)</button>
</div>

<script>
    // ส่วนการทำงานของระบบและ Firebase ยังคงเดิม 100% ห้ามเปลี่ยนแปลง
    const firebaseConfig = {
        apiKey: "AIzaSyDCZB-UH_dGvLse9CnMmTurmVpDHTvW6RM",
        authDomain: "nu-mission-2025.firebaseapp.com",
        projectId: "nu-mission-2025",
        storageBucket: "nu-mission-2025.firebasestorage.app",
        messagingSenderId: "55452072551",
        appId: "1:55452072551:web:b6a67a07e9e70d73ee72c2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = loadFromCloud;

    async function loadFromCloud() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="9">กำลังโหลดข้อมูลจาก Cloud...</td></tr>';
        
        try {
            const snapshot = await db.collection("FinalResults2026").orderBy("order", "asc").get();
            const data = [];
            snapshot.forEach(doc => {
                data.push({ id: doc.id, ...doc.data() });
            });
            renderTable(data);
        } catch (e) {
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="9">ยังไม่มีข้อมูลในระบบ</td></tr>';
        }
    }

    async function addNewTeam() {
        const nameInput = document.getElementById('newTeamName');
        const name = nameInput.value.trim();
        if (!name) return alert("กรุณาระบุชื่อทีม");

        try {
            const snapshot = await db.collection("FinalResults2026").get();
            const nextOrder = snapshot.size + 1;

            const newTeam = {
                order: nextOrder,
                name: name,
                jRaw: 0, vRaw: 0, j50: 0, v50: 0, total: 0, rank: '-'
            };

            await db.collection("FinalResults2026").add(newTeam);
            nameInput.value = '';
            loadFromCloud();
        } catch (e) {
            alert("เกิดข้อผิดพลาด: " + e.message);
        }
    }

    async function runProcess() {
        const rows = Array.from(document.querySelectorAll('#tableBody tr'));
        if (rows.length === 0) return;

        let totalVotes = 0;
        rows.forEach(r => {
            const vInput = r.querySelector('.i-v');
            if (vInput) totalVotes += parseFloat(vInput.value) || 0;
        });
        document.getElementById('totalVotesText').innerText = `ยอดโหวตรวม: ${totalVotes.toLocaleString()} คน`;

        let dataset = rows.map(r => {
            const id = r.getAttribute('data-id');
            const order = parseInt(r.cells[0].innerText);
            const name = r.querySelector('.input-name-display').innerText;
            const jRaw = parseFloat(r.querySelector('.i-j').value) || 0;
            const vRaw = parseFloat(r.querySelector('.i-v').value) || 0;
            
            const j50 = jRaw / 2;
            const v50 = totalVotes > 0 ? (vRaw / totalVotes) * 50 : 0;
            const total = j50 + v50;

            return { id, order, name, jRaw, vRaw, j50, v50, total };
        });

        let sorted = dataset.filter(d => d.total > 0).sort((a, b) => b.total - a.total);
        
        const batch = db.batch();
        dataset.forEach(d => {
            const rank = d.total > 0 ? (sorted.findIndex(s => s.id === d.id) + 1) : '-';
            const docRef = db.collection("FinalResults2026").doc(d.id);
            batch.update(docRef, { ...d, rank: rank });
        });

        await batch.commit();
        alert("คำนวณอันดับและบันทึกสำเร็จ!");
        loadFromCloud();
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        data.forEach(d => {
            let rankClass = '';
            if (d.rank === 1) rankClass = 'r1';
            else if (d.rank === 2) rankClass = 'r2';
            else if (d.rank === 3) rankClass = 'r3';
            else if (d.rank === 4) rankClass = 'r4';

            const row = document.createElement('tr');
            row.setAttribute('data-id', d.id);
            row.innerHTML = `
                <td>${d.order}</td>
                <td class="team-name-cell"><div class="input-name-display">${d.name}</div></td>
                <td><input type="number" class="i-j input-score" value="${d.jRaw || 0}"></td>
                <td><input type="number" class="i-v input-score" value="${d.vRaw || 0}"></td>
                <td style="color:#666">${(d.j50 || 0).toFixed(2)}</td>
                <td style="color:#666">${(d.v50 || 0).toFixed(2)}</td>
                <td style="font-weight:800; color:var(--primary-color);">${(d.total || 0).toFixed(2)}</td>
                <td><span class="rank-badge ${rankClass}">${d.rank}</span></td>
                <td>
                    <button class="btn btn-edit" onclick="editName(this)">แก้ไขชื่อ</button>
                    <button class="btn btn-delete" onclick="deleteTeam('${d.id}')">ลบ</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    async function deleteTeam(id) {
        if (confirm("คุณต้องการลบทีมนี้ใช่หรือไม่?")) {
            await db.collection("FinalResults2026").doc(id).delete();
            loadFromCloud();
        }
    }

    function editName(btn) {
        const row = btn.closest('tr');
        const nameDiv = row.querySelector('.input-name-display');
        const oldName = nameDiv.innerText;
        nameDiv.innerHTML = `<input type="text" class="editable-name" value="${oldName}">`;
        btn.innerText = "ตกลง";
        btn.onclick = () => saveName(btn, row.getAttribute('data-id'));
    }

    async function saveName(btn, id) {
        const row = btn.closest('tr');
        const newName = row.querySelector('.editable-name').value;
        await db.collection("FinalResults2026").doc(id).update({ name: newName });
        loadFromCloud();
    }
</script>
</body>
</html>
